<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ShiftOps — Shift Handover Board</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

:root {
  --primary: #7c3aed;
  --primary-light: #8b5cf6;
  --primary-dark: #6d28d9;
  --accent: #06b6d4;
  --accent2: #f59e0b;
  --success: #10b981;
  --danger: #ef4444;
  --bg: #0f0f1a;
  --bg2: #161628;
  --bg3: #1e1e35;
  --surface: #1a1a2e;
  --surface2: #22223a;
  --border: rgba(124,58,237,.2);
  --border2: rgba(255,255,255,.06);
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --glow: 0 0 30px rgba(124,58,237,.3);
  --glow-sm: 0 0 15px rgba(124,58,237,.2);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--primary);border-radius:10px;}

/* ════════════════════════════════════════
   WELCOME / LOGIN SCREEN
════════════════════════════════════════ */
#welcomeScreen {
  position:fixed;inset:0;z-index:500;overflow:hidden;
  background: linear-gradient(135deg, #0f0f1a 0%, #1a0a2e 40%, #0a1628 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

/* Animated bg orbs */
.orb {
  position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;animation:orbFloat 8s ease-in-out infinite;
}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,.35),transparent 70%);top:-100px;left:-100px;animation-delay:0s;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(6,182,212,.25),transparent 70%);bottom:-80px;right:-80px;animation-delay:3s;}
.orb3{width:300px;height:300px;background:radial-gradient(circle,rgba(245,158,11,.2),transparent 70%);top:40%;left:60%;animation-delay:5s;}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-30px) scale(1.05);}}

/* Grid lines */
.grid-bg{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(124,58,237,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,58,237,.06) 1px, transparent 1px);
  background-size:60px 60px;
}

/* Floating stat chips on welcome screen */
.floating-chips{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.chip{
  position:absolute;background:rgba(255,255,255,.04);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 16px;
  font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;
  animation:chipFloat linear infinite;
}
.chip span{color:var(--primary-light);font-weight:700;}
@keyframes chipFloat{0%{transform:translateY(100vh) translateX(0) rotate(0deg);opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{transform:translateY(-100px) translateX(20px) rotate(5deg);opacity:0;}}

/* Welcome content */
.welcome-content{position:relative;z-index:10;text-align:center;padding:20px;}
.welcome-logo{margin-bottom:32px;}
.logo-icon{
  width:90px;height:90px;border-radius:24px;margin:0 auto 20px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:40px;
  box-shadow:0 0 40px rgba(124,58,237,.5),0 20px 60px rgba(0,0,0,.5);
  animation:logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse{0%,100%{box-shadow:0 0 40px rgba(124,58,237,.5),0 20px 60px rgba(0,0,0,.5);}50%{box-shadow:0 0 60px rgba(124,58,237,.7),0 20px 60px rgba(0,0,0,.5);}}
.welcome-title{font-size:42px;font-weight:900;line-height:1.1;margin-bottom:12px;background:linear-gradient(135deg,#fff 0%,var(--primary-light) 50%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.welcome-sub{font-size:16px;color:var(--text2);margin-bottom:48px;font-weight:400;}
.welcome-sub span{color:var(--accent);font-weight:600;}

/* Login card */
.login-card{
  background:rgba(22,22,40,.8);backdrop-filter:blur(20px);
  border:1px solid rgba(124,58,237,.3);border-radius:24px;
  padding:40px;width:100%;max-width:420px;
  box-shadow:0 25px 80px rgba(0,0,0,.5),var(--glow);
  position:relative;overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--primary),var(--accent),transparent);
}
.login-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:14px;display:none;}
.input-group{position:relative;margin-bottom:16px;}
.input-group label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:8px;}
.input-group input{
  width:100%;padding:12px 16px;
  background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);
  border-radius:12px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;
  outline:none;transition:all .2s;
}
.input-group input:focus{border-color:var(--primary);background:rgba(124,58,237,.08);box-shadow:0 0 0 4px rgba(124,58,237,.1);}
.input-group input::placeholder{color:var(--text3);}
.btn-login{
  width:100%;padding:14px;border:none;border-radius:12px;font-weight:700;font-size:15px;
  cursor:pointer;color:white;margin-top:8px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  box-shadow:0 8px 24px rgba(124,58,237,.4);transition:all .2s;position:relative;overflow:hidden;
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,58,237,.5);}
.btn-login:active{transform:translateY(0);}
.btn-login::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);border-radius:12px;}
.welcome-badges{display:flex;gap:12px;justify-content:center;margin-top:32px;flex-wrap:wrap;}
.w-badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--text2);}
.w-badge span{font-size:16px;}

/* ════════════════════════════════════════
   LOADING SCREEN
════════════════════════════════════════ */
#loadingScreen{
  position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;
  background:linear-gradient(135deg,#0f0f1a,#1a0a2e);
}
.loading-logo{width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:8px;box-shadow:var(--glow);}
.loading-text{font-size:18px;font-weight:700;color:var(--text);}
.loading-sub{font-size:13px;color:var(--text3);}
.loader-bar{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden;margin-top:8px;}
.loader-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:10px;animation:loaderAnim 1.5s ease-in-out infinite;}
@keyframes loaderAnim{0%{width:0%;margin-left:0;}50%{width:60%;margin-left:20%;}100%{width:0%;margin-left:100%;}}

/* ════════════════════════════════════════
   MAIN APP
════════════════════════════════════════ */
#mainApp{display:none;}

/* ── HEADER ── */
.app-header{
  background:rgba(22,22,40,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border2);padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
  height:64px;position:sticky;top:0;z-index:100;
}
.app-header-left{display:flex;align-items:center;gap:16px;}
.header-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.header-brand{font-size:16px;font-weight:800;background:linear-gradient(135deg,#fff,var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-shift-badge{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);border-radius:8px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--primary-light);}
.header-right{display:flex;align-items:center;gap:8px;}
.hbtn{padding:7px 14px;border-radius:9px;font-weight:600;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:rgba(255,255,255,.05);color:var(--text2);transition:all .15s;}
.hbtn:hover{background:rgba(255,255,255,.1);color:var(--text);border-color:rgba(255,255,255,.15);}
.hbtn.primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;border-color:transparent;}
.hbtn.primary:hover{opacity:.9;}
.hbtn.accent{background:rgba(6,182,212,.15);color:var(--accent);border-color:rgba(6,182,212,.3);}
.hbtn.success{background:rgba(16,185,129,.15);color:var(--success);border-color:rgba(16,185,129,.3);}
.hbtn.danger{background:rgba(239,68,68,.15);color:#fca5a5;border-color:rgba(239,68,68,.3);}
.hbtn.ar-on{background:linear-gradient(135deg,rgba(16,185,129,.2),rgba(6,182,212,.2));color:var(--success);border-color:rgba(16,185,129,.4);animation:arPulse 2s infinite;}
@keyframes arPulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.3);}50%{box-shadow:0 0 0 6px rgba(16,185,129,0);}}

/* live indicator */
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--success);display:inline-block;margin-right:5px;animation:liveBlink 2s infinite;}
@keyframes liveBlink{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,.4);}50%{opacity:.6;box-shadow:0 0 0 5px rgba(16,185,129,0);}}
.header-info-text{font-size:11px;color:var(--text3);}
.header-info-text b{color:var(--text2);}

/* ── NAV ── */
.app-nav{
  background:rgba(22,22,40,.8);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border2);
  padding:0 24px;display:flex;gap:2px;overflow-x:auto;
}
.app-nav::-webkit-scrollbar{height:0;}
.nav-btn{
  padding:14px 18px;border:none;background:transparent;color:var(--text3);
  font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .2s;font-family:'Inter',sans-serif;
  display:flex;align-items:center;gap:6px;
}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,.04);}
.nav-btn.active{color:var(--primary-light);border-bottom-color:var(--primary-light);}
.nav-badge{background:var(--danger);color:white;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;}

/* ── CONTAINER ── */
.container{max-width:1100px;margin:0 auto;padding:24px 20px;}

/* ── CARDS ── */
.card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;padding:20px;margin-bottom:16px;
  transition:border-color .2s;
}
.card:hover{border-color:rgba(124,58,237,.25);}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.card-title{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
.card-title-icon{width:28px;height:28px;border-radius:8px;background:rgba(124,58,237,.2);display:flex;align-items:center;justify-content:center;font-size:14px;}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:14px;padding:18px;position:relative;overflow:hidden;
  transition:all .2s;cursor:default;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--stat-color,var(--primary));}
.stat-card:hover{border-color:var(--stat-color,var(--primary));transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.stat-num{font-size:32px;font-weight:900;color:var(--stat-color,var(--primary));line-height:1;}
.stat-label{font-size:11px;font-weight:600;color:var(--text3);margin-top:6px;text-transform:uppercase;letter-spacing:.5px;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.stat-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:32px;opacity:.1;}

/* ── WELCOME BANNER ── */
.welcome-banner{
  background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(6,182,212,.1));
  border:1px solid rgba(124,58,237,.3);border-radius:16px;padding:20px 24px;
  margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
  position:relative;overflow:hidden;
}
.welcome-banner::before{content:'';position:absolute;top:-50%;right:-50px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.1),transparent 70%);pointer-events:none;}
.wb-left h2{font-size:20px;font-weight:800;margin-bottom:4px;}
.wb-left p{font-size:13px;color:var(--text2);}
.wb-right{display:flex;gap:8px;flex-wrap:wrap;}
.shift-pill{background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:10px;padding:8px 14px;font-size:12px;font-weight:600;color:var(--text2);}
.shift-pill span{color:var(--accent);font-size:13px;}

/* ── TASK CARDS ── */
.task-card{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:14px;padding:14px 16px;margin-bottom:10px;
  cursor:pointer;transition:all .2s;
  border-left:3px solid transparent;position:relative;overflow:hidden;
}
.task-card:hover{border-color:rgba(124,58,237,.4);transform:translateX(3px);background:rgba(34,34,58,.9);}
.task-card.sla-breach{border-left-color:var(--danger)!important;background:rgba(239,68,68,.05);}
.task-card.sla-warning{border-left-color:var(--accent2)!important;background:rgba(245,158,11,.04);}
.task-card.my-task{border-left-color:var(--accent)!important;}
.task-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;}
.task-title{font-weight:700;font-size:14px;color:var(--text);}
.task-meta{font-size:11px;color:var(--text3);margin-top:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.sla-row{display:flex;align-items:center;gap:8px;margin:7px 0 4px;}
.sla-bar-wrap{flex:1;background:rgba(255,255,255,.06);border-radius:4px;height:4px;overflow:hidden;min-width:60px;}
.sla-bar-fill{height:100%;border-radius:4px;transition:width .5s;}
.sla-label{font-size:10px;font-weight:700;white-space:nowrap;}
.assignee-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.25);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;color:var(--primary-light);}
.assignee-pill.unassigned{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25);color:#fca5a5;}
.assign-btn-inline{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);border-radius:8px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--primary-light);cursor:pointer;transition:all .15s;}
.assign-btn-inline:hover{background:rgba(124,58,237,.3);}

/* ── AVATAR ── */
.avatar{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;color:white;flex-shrink:0;}

/* ── FORMS ── */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:7px;}
input[type=text],input[type=email],input[type=password],input[type=number],select,textarea{
  width:100%;padding:10px 14px;background:rgba(255,255,255,.04);
  border:1.5px solid var(--border2);border-radius:10px;
  color:var(--text);font-size:14px;font-family:'Inter',sans-serif;
  outline:none;transition:all .2s;
}
input:focus,select:focus,textarea:focus{border-color:var(--primary);background:rgba(124,58,237,.06);box-shadow:0 0 0 3px rgba(124,58,237,.1);}
input::placeholder,textarea::placeholder{color:var(--text3);}
select option{background:var(--bg3);color:var(--text);}
textarea{min-height:80px;resize:vertical;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

/* ── BUTTONS ── */
.btn{padding:10px 20px;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;color:white;font-family:'Inter',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{opacity:.9;transform:translateY(-1px);}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));}
.btn-success{background:linear-gradient(135deg,var(--success),#059669);}
.btn-danger{background:linear-gradient(135deg,var(--danger),#dc2626);}
.btn-orange{background:linear-gradient(135deg,var(--accent2),#d97706);}
.btn-gray{background:rgba(255,255,255,.1);color:var(--text2);border:1px solid var(--border2);}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px;}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:6px;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{
  background:var(--bg3);border:1px solid var(--border);border-radius:20px;
  padding:28px;width:100%;max-width:540px;
  box-shadow:0 25px 80px rgba(0,0,0,.6),var(--glow);
  max-height:90vh;overflow-y:auto;position:relative;
}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--primary),var(--accent),transparent);border-radius:20px 20px 0 0;}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
.modal-title{font-weight:800;font-size:17px;color:var(--text);}
.close-btn{background:rgba(255,255,255,.06);border:1px solid var(--border2);width:32px;height:32px;border-radius:8px;cursor:pointer;color:var(--text3);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.close-btn:hover{background:rgba(239,68,68,.15);color:var(--danger);}

/* ── TIMELINE ── */
.timeline{border-left:2px solid var(--border);margin-left:10px;padding-left:18px;}
.tl-item{position:relative;margin-bottom:12px;}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--primary);position:absolute;left:-24px;top:4px;box-shadow:0 0 6px rgba(124,58,237,.5);}
.tl-text{font-size:12px;color:var(--text2);}
.tl-time{font-size:11px;color:var(--text3);margin-top:2px;}

/* ── NOTIFICATION TOAST ── */
.notif{position:fixed;top:20px;right:20px;padding:14px 20px;border-radius:12px;font-weight:600;font-size:13px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.4);color:white;animation:toastIn .3s cubic-bezier(.34,1.56,.64,1);max-width:340px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);}
@keyframes toastIn{from{transform:translateX(60px) scale(.9);opacity:0;}to{transform:translateX(0) scale(1);opacity:1;}}

/* ── SECTION HEADERS ── */
.section-title{font-weight:700;font-size:14px;color:var(--text);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.sort-pills{display:flex;gap:6px;}
.sort-pill{padding:5px 12px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.sort-pill.active{background:rgba(124,58,237,.2);color:var(--primary-light);border-color:rgba(124,58,237,.4);}
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:10px;}

/* ── PROGRESS ── */
.progress-wrap{background:rgba(255,255,255,.06);border-radius:6px;height:6px;overflow:hidden;margin:6px 0 10px;}
.progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .5s;}

/* ── REMINDER BANNER ── */
.reminder-banner{
  background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(239,68,68,.08));
  border:1px solid rgba(245,158,11,.3);border-radius:14px;padding:14px 18px;margin-bottom:16px;cursor:pointer;transition:all .2s;
}
.reminder-banner:hover{border-color:rgba(245,158,11,.5);}
.reminder-banner-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.reminder-pulse{display:inline-block;width:9px;height:9px;background:var(--danger);border-radius:50%;animation:rp 1.2s infinite;margin-right:6px;}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5);}50%{box-shadow:0 0 0 8px rgba(239,68,68,0);}}
.reminder-items{margin-top:12px;display:none;}
.reminder-items.open{display:block;}
.reminder-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:10px;margin-bottom:6px;font-size:12px;}
.reminder-item.critical{background:rgba(239,68,68,.08);border-left:3px solid var(--danger);}
.reminder-item.warning{background:rgba(245,158,11,.08);border-left:3px solid var(--accent2);}
.reminder-item.info{background:rgba(6,182,212,.08);border-left:3px solid var(--accent);}
.stale-badge{display:inline-block;background:var(--danger);color:white;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;margin-left:6px;}

/* ── ANNOUNCE ── */
.announce{background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--accent);}

/* ── PERSON CARD ── */
.person-card{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:16px;margin-bottom:12px;transition:border-color .2s;}
.person-card:hover{border-color:rgba(124,58,237,.3);}
.mini-stat{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:600;margin:3px;color:var(--text2);}
.eff-bar-wrap{background:rgba(255,255,255,.06);border-radius:4px;height:8px;overflow:hidden;margin:8px 0 4px;}
.eff-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--primary),var(--success));}

/* ── USER ROWS ── */
.user-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;margin-bottom:8px;border:2px solid var(--border2);cursor:pointer;transition:all .15s;background:var(--surface2);}
.user-row:hover{border-color:var(--primary);background:rgba(124,58,237,.06);}
.user-row.selected{border-color:var(--primary);background:rgba(124,58,237,.1);}

/* ── TOGGLE ── */
.toggle-sw{position:relative;display:inline-block;width:44px;height:24px;}
.toggle-sw input{opacity:0;width:0;height:0;}
.toggle-sl{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,.1);border-radius:24px;transition:.3s;border:1px solid var(--border2);}
.toggle-sl:before{content:"";position:absolute;width:18px;height:18px;left:2px;bottom:2px;background:var(--text3);border-radius:50%;transition:.3s;}
.toggle-sw input:checked+.toggle-sl{background:var(--primary);border-color:var(--primary);}
.toggle-sw input:checked+.toggle-sl:before{transform:translateX(20px);background:white;}

/* ── AR STATUS ── */
.ar-status{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.ar-status.running{background:rgba(16,185,129,.1);color:var(--success);border:1px solid rgba(16,185,129,.3);}
.ar-status.paused{background:rgba(255,255,255,.05);color:var(--text3);border:1px solid var(--border2);}

/* ── FILTER ROW ── */
.filter-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}

/* ── VOICE ── */
.voice-area{background:rgba(124,58,237,.06);border:2px dashed rgba(124,58,237,.3);border-radius:14px;padding:20px;margin-bottom:18px;text-align:center;}
.mic-btn{width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;font-size:28px;display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--primary),var(--accent));color:white;box-shadow:0 6px 20px rgba(124,58,237,.4);transition:all .2s;}
.mic-btn:hover{transform:scale(1.08);}
.mic-btn.listening{background:linear-gradient(135deg,var(--danger),#dc2626);animation:micPulse 1s infinite;}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5);}50%{box-shadow:0 0 0 14px rgba(239,68,68,0);}}
.transcript-box{background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:10px;padding:12px;margin-top:12px;font-size:13px;color:var(--text2);min-height:40px;text-align:left;line-height:1.6;}

/* ── ADMIN TABS ── */
.admin-tabs{display:flex;border-bottom:1px solid var(--border2);overflow-x:auto;}
.admin-tab-btn{padding:12px 18px;border:none;background:transparent;color:var(--text3);font-weight:600;font-size:12px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;font-family:'Inter',sans-serif;}
.admin-tab-btn.active{color:var(--primary-light);border-bottom-color:var(--primary-light);}

/* ── WEBHOOK CODE ── */
.code-box{background:rgba(0,0,0,.3);border:1px solid var(--border2);border-radius:10px;padding:14px;font-family:monospace;font-size:12px;color:#cdd6f4;white-space:pre-wrap;max-height:300px;overflow-y:auto;line-height:1.7;}

/* ── SHIFT BADGE ── */
.shift-indicator{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;}

@media(max-width:700px){
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .row2,.row3,.filter-grid{grid-template-columns:1fr;}
  .app-header{padding:0 14px;}
  .welcome-title{font-size:28px;}
  .hbtn span.hide-mobile{display:none;}
}
</style>
</head>

<script>
// ── FIREBASE ──────────────────────────────────────────────────────────
const firebaseConfig={apiKey:"AIzaSyBHfudEqWBBObPB6yJEzqhSo1lo4av10TQ",authDomain:"shift-handover-bd0f9.firebaseapp.com",databaseURL:"https://shift-handover-bd0f9-default-rtdb.firebaseio.com",projectId:"shift-handover-bd0f9",storageBucket:"shift-handover-bd0f9.firebasestorage.app",messagingSenderId:"219517214969",appId:"1:219517214969:web:96d0390f2df83678838228"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// ── CONSTANTS ─────────────────────────────────────────────────────────
const SHIFTS=['All','Morning','Afternoon','Night'];
const PRIORITIES=['High','Medium','Low'];
const ITEM_TYPES=['Task','Email','Chat','Ticket','Note'];
const STATUSES=['Open','In Progress','Waiting on L3','Waiting on Client','Restored','Closure Confirmation','Closed'];
const S_COLOR={'Open':'#f59e0b','In Progress':'#3b82f6','Waiting on L3':'#8b5cf6','Waiting on Client':'#06b6d4','Restored':'#10b981','Closure Confirmation':'#f97316','Closed':'#6b7280'};
const S_ICON={'Open':'📬','In Progress':'🔄','Waiting on L3':'⬆️','Waiting on Client':'🤝','Restored':'✔️','Closure Confirmation':'📋','Closed':'✅'};
let SLA_CONFIG={High:60,Medium:240,Low:480};
const P_COLOR={High:'#ef4444',Medium:'#f59e0b',Low:'#10b981'};
const P_ICON={High:'🔴',Medium:'🟡',Low:'🟢'};
const T_ICON={Task:'📋',Email:'📧',Chat:'💬',Ticket:'🎫',Note:'📝'};
const ROLE_COLOR={Admin:'#8b5cf6',Supervisor:'#3b82f6',Agent:'#10b981'};
const AVATAR_COLORS=['#7c3aed','#0078d4','#10b981','#ef4444','#f59e0b','#8b5cf6','#06b6d4','#f97316'];

let SHIFTS_CONFIG={Morning:{ist:'6:00 AM – 3:00 PM',est:'7:30 PM – 4:30 AM',notifyIST:'6:15 AM',notifyEST:'7:45 PM'},Afternoon:{ist:'2:00 PM – 11:00 PM',est:'3:30 AM – 1:30 PM',notifyIST:'2:15 PM',notifyEST:'3:45 AM'},Night:{ist:'9:00 PM – 6:00 AM',est:'10:30 AM – 8:30 PM',notifyIST:'9:15 PM',notifyEST:'10:45 AM'}};
let PA_WEBHOOK_URL='';
let autoReminderConfig={enabled:false,normalIntervalMins:30,majorIntervalMins:15,lastFired:null,lastMajorFired:null};
let autoReminderTimer=null,countdownInterval=null,autoReminderCountdown=0;
let reminderSettings={enabled:true,autoPopup:true,thresholds:{High:30,Medium:60,Low:120},notifyOnDashboard:true};
let tasks={},users={},curUser=null,curView='dashboard',sortBy='priority';
let recognition=null,isListening=false,reminderBannerOpen=false,_firstRender=true;

// ── FLOATING CHIPS ANIMATION ──────────────────────────────────────────
function spawnChips(){
  const msgs=['🔴 High Priority Ticket','✅ SLA Met — 48m','🔄 Assigned to Vignesh','📢 Teams notified','⏰ Auto-Remind fired','📋 Task closed','🙋 Ayyanar took task','🔗 PA webhook OK'];
  const container=document.getElementById('floatingChips');
  if(!container)return;
  function spawnOne(){
    const el=document.createElement('div');
    el.className='chip';
    el.innerHTML=msgs[Math.floor(Math.random()*msgs.length)].replace(/(🔴|✅|🔄|📢|⏰|📋|🙋|🔗)/,'<span>$1</span>');
    el.style.left=Math.random()*90+'%';
    const dur=8+Math.random()*6;
    el.style.animationDuration=dur+'s';
    el.style.animationDelay='0s';
    container.appendChild(el);
    setTimeout(()=>el.remove(),dur*1000);
  }
  for(let i=0;i<4;i++)setTimeout(spawnOne,i*1500);
  setInterval(spawnOne,2000);
}

// ── HELPERS ───────────────────────────────────────────────────────────
function uid(){return db.ref().push().key;}
function fmt(d){return d?new Date(d).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—';}
function esc(s){return s?(s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''; }
function badge(t,c,icon=''){return `<span class="badge" style="background:${c}18;color:${c};border:1px solid ${c}30">${icon?icon+' ':''}${t}</span>`;}
function getCurrentShift(){const h=new Date().getHours();if(h>=6&&h<14)return'Morning';if(h>=14&&h<21)return'Afternoon';return'Night';}
function isTerminal(s){return s==='Closed';}
function notify(msg,type='success'){
  const n=document.getElementById('notif');
  n.textContent=msg;
  const colors={error:'#ef4444',info:'#3b82f6',warn:'#f59e0b',success:'#10b981'};
  n.style.background=colors[type]||colors.success;
  n.style.display='block';setTimeout(()=>n.style.display='none',3500);
}
function fmtMins(m){if(!m&&m!==0)return'—';if(m<60)return m+'m';return Math.floor(m/60)+'h '+(m%60?m%60+'m':'');}
function taskArr(){
  const pO={High:0,Medium:1,Low:2};const sO={'Open':0,'In Progress':1,'Waiting on L3':2,'Waiting on Client':3,'Restored':4,'Closure Confirmation':5,'Closed':6};
  let arr=Object.values(tasks||{});
  if(sortBy==='priority')arr.sort((a,b)=>(pO[a.priority]??1)-(pO[b.priority]??1)||sO[a.status]-sO[b.status]);
  else if(sortBy==='status')arr.sort((a,b)=>sO[a.status]-sO[b.status]);
  else arr.sort((a,b)=>new Date(b.date)-new Date(a.date));
  return arr;
}
function getActiveUsers(){return Object.values(users||{}).filter(u=>u.active);}
function avatarColor(name){let h=0;for(let i=0;i<(name||'').length;i++)h=name.charCodeAt(i)+((h<<5)-h);return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length];}
function avatarInitials(name){return(name||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}
function assignedCount(name){return Object.values(tasks).filter(t=>t.assignedTo===name&&!isTerminal(t.status)).length;}
function closedToday(){const today=new Date().toDateString();return Object.values(tasks).filter(t=>isTerminal(t.status)&&t.dateClosed&&new Date(t.dateClosed).toDateString()===today).length;}
function unassignedCount(){return Object.values(tasks).filter(t=>!isTerminal(t.status)&&!t.assignedTo).length;}

// ── SLA ───────────────────────────────────────────────────────────────
function getSLAInfo(t){
  const lm=SLA_CONFIG[t.priority]||240;
  const start=new Date(t.date).getTime(),end=t.dateClosed?new Date(t.dateClosed).getTime():Date.now();
  const el=Math.floor((end-start)/60000);
  const pct=Math.min(100,Math.round(el/lm*100));
  const rem=lm-el;
  return{limitMins:lm,elapsedMins:el,pct,remaining:rem,breached:el>lm&&!isTerminal(t.status),warning:!isTerminal(t.status)&&pct>=75&&el<=lm};
}
function slaBarHTML(t){
  const s=getSLAInfo(t);
  if(isTerminal(t.status)){const ok=s.elapsedMins<=s.limitMins;return`<div class="sla-row"><div class="sla-bar-wrap"><div class="sla-bar-fill" style="width:${s.pct}%;background:${ok?'#10b981':'#ef4444'}"></div></div><span class="sla-label" style="color:${ok?'#10b981':'#ef4444'}">${ok?'✅ Met':'❌ Breached'}</span></div>`;}
  const col=s.breached?'#ef4444':s.warning?'#f59e0b':'#7c3aed';
  const lbl=s.breached?`⚡ +${fmtMins(Math.abs(s.remaining))} over`:s.remaining<=0?'⚠️ Due now':`${fmtMins(s.remaining)} left`;
  return`<div class="sla-row"><div class="sla-bar-wrap"><div class="sla-bar-fill" style="width:${s.pct}%;background:${col}"></div></div><span class="sla-label" style="color:${col}">${lbl}</span></div>`;
}

// ── POWER AUTOMATE ────────────────────────────────────────────────────
async function triggerPA(task,eventType,extra={}){
  if(!PA_WEBHOOK_URL)return;
  const sh=task.shift==='All'?getCurrentShift():task.shift;const cfg=SHIFTS_CONFIG[sh]||{};const sla=getSLAInfo(task);
  try{await fetch(PA_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},mode:'no-cors',body:JSON.stringify({eventType,task:{id:task.id,title:task.title,description:task.description||'',type:task.type,shift:task.shift,priority:task.priority,status:task.status,submittedBy:task.submittedBy,assignedTo:task.assignedTo||'Unassigned',date:task.date,slaMinutes:SLA_CONFIG[task.priority],slaBreached:sla.breached,slaRemaining:sla.remaining},shiftInfo:{ist:cfg.ist||'',est:cfg.est||''},appUrl:'https://ayyanartest-ui.github.io/shift-handover',timestamp:new Date().toISOString(),...extra})});}catch(e){}
}

// ── AUTO-REMINDER ENGINE ──────────────────────────────────────────────
function buildReminderMessage(list,isMajor){
  const sh=getCurrentShift();const cfg=SHIFTS_CONFIG[sh]||{};
  const grouped={};list.forEach(t=>{const k=t.assignedTo||'⚠️ UNASSIGNED';if(!grouped[k])grouped[k]=[];grouped[k].push(t);});
  let msg=isMajor?`🚨 URGENT ALERT — ${sh} Shift | ${new Date().toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}`:
    `⏰ PENDING REMINDER — ${sh} Shift | ${new Date().toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}`;
  msg+=`\nIST: ${cfg.ist||''} | EST: ${cfg.est||''}\n\n${list.length} item(s) need attention:\n`;
  Object.entries(grouped).forEach(([assignee,items])=>{
    const fn=assignee.split(' ')[0];
    msg+=`\n👤 @${fn} — ${items.length} item${items.length>1?'s':''} pending:\n`;
    items.forEach(t=>{const sla=getSLAInfo(t);msg+=`  ${P_ICON[t.priority]} ${T_ICON[t.type]} ${t.title}\n     ${t.status} | ${sla.breached?'🔴 BREACHED +'+fmtMins(Math.abs(sla.remaining)):'⏱ '+fmtMins(sla.remaining)+' left'}\n`;});
  });
  msg+=`\n${isMajor?'🚨 Immediate action required!':'Please review and update status.'}\n👉 https://ayyanartest-ui.github.io/shift-handover`;
  return msg;
}
async function fireAutoReminder(isMajor=false){
  const active=taskArr().filter(t=>!isTerminal(t.status));if(!active.length)return;
  const major=active.filter(t=>t.priority==='High'||getSLAInfo(t).breached);
  const list=isMajor?major:active;if(!list.length)return;
  const msg=buildReminderMessage(list,isMajor);
  if(PA_WEBHOOK_URL){try{await fetch(PA_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},mode:'no-cors',body:JSON.stringify({eventType:isMajor?'major_reminder':'scheduled_reminder',message:msg,assignees:[...new Set(list.map(t=>t.assignedTo).filter(Boolean))],taskCount:list.length,highCount:list.filter(t=>t.priority==='High').length,timestamp:new Date().toISOString()})});}catch(e){}}
  if(isMajor)autoReminderConfig.lastMajorFired=new Date().toISOString();else autoReminderConfig.lastFired=new Date().toISOString();
  db.ref('config/autoReminder').update({lastFired:autoReminderConfig.lastFired,lastMajorFired:autoReminderConfig.lastMajorFired});
  notify(isMajor?`🚨 Major alert sent for ${list.length} tasks!`:`📢 Reminder sent for ${list.length} tasks!`,'info');
  window._lastReminderMsg=msg;
}
function startAutoReminderEngine(){
  stopAutoReminderEngine();if(!autoReminderConfig.enabled)return;
  const nm=autoReminderConfig.normalIntervalMins*60*1000,mm=autoReminderConfig.majorIntervalMins*60*1000;
  autoReminderCountdown=Math.min(nm,mm);updateARButton();
  countdownInterval=setInterval(()=>{autoReminderCountdown=Math.max(0,autoReminderCountdown-1000);updateARButton();},1000);
  autoReminderTimer=setInterval(()=>fireAutoReminder(false),nm);
  window._majorTimer=setInterval(()=>{const m=taskArr().filter(t=>!isTerminal(t.status)&&(t.priority==='High'||getSLAInfo(t).breached));if(m.length)fireAutoReminder(true);},mm);

function stopAutoReminderEngine(){

  if(window._majorTimer){clearInterval(window._majorTimer);window._majorTimer=null;}
  if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;}
  autoReminderCountdown=0;updateARButton();
}
function updateARButton(){
  const btn=document.getElementById('arStatusBtn');if(!btn)return;
  if(autoReminderConfig.enabled){
    const s=Math.ceil(autoReminderCountdown/1000),m=Math.floor(s/60),ss=s%60;

}

// ── VOICE ─────────────────────────────────────────────────────────────
function toggleVoice(){isListening?stopVoice():startVoice();}
function startVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){notify('Voice not supported. Use Chrome.','error');return;}recognition=new SR();recognition.lang='en-IN';recognition.continuous=false;recognition.interimResults=true;isListening=true;document.getElementById('micBtn').classList.add('listening');document.getElementById('micBtn').textContent='⏹';document.getElementById('aiStatus').textContent='🎙️ Listening...';recognition.onresult=e=>{let interim='',final='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;}document.getElementById('transcriptBox').textContent=final||interim;if(final){stopVoice();processVoice(final);}};recognition.onerror=()=>{stopVoice();notify('Mic error.','error');};recognition.onend=()=>{if(isListening)stopVoice();};recognition.start();}
function stopVoice(){isListening=false;if(recognition)recognition.stop();const btn=document.getElementById('micBtn');if(btn){btn.classList.remove('listening');btn.textContent='🎤';}}
function processVoice(t){const low=t.toLowerCase();let priority='Medium';if(/urgent|critical|high|emergency|asap|failed|down|broken/i.test(low))priority='High';else if(/minor|low|later|not urgent/i.test(low))priority='Low';let shift='';if(/morning/i.test(low))shift='Morning';else if(/afternoon/i.test(low))shift='Afternoon';else if(/night/i.test(low))shift='Night';let type='Task';if(/email/i.test(low))type='Email';else if(/chat|teams/i.test(low))type='Chat';else if(/ticket|incident/i.test(low))type='Ticket';else if(/note|fyi/i.test(low))type='Note';let title=t.split(' ').slice(0,8).join(' ');title=title.charAt(0).toUpperCase()+title.slice(1);const tf=document.getElementById('f-title');if(tf)tf.value=title;const df=document.getElementById('f-desc');if(df)df.value=t.charAt(0).toUpperCase()+t.slice(1);const pf=document.getElementById('f-pri');if(pf)pf.value=priority;const sf=document.getElementById('f-shift-log');if(sf&&shift)sf.value=shift;const typeF=document.getElementById('f-type-log');if(typeF)typeF.value=type;const au=getActiveUsers();const mentioned=au.find(u=>low.includes(u.name.split(' ')[0].toLowerCase()));if(mentioned){const af=document.getElementById('f-assign');if(af)af.value=mentioned.name;}document.getElementById('aiStatus').textContent='✅ Form auto-filled from speech!';}

async function selectUserForAssign(taskId,userName,userId){
  const t=tasks[taskId]||Object.values(tasks).find(x=>x.id===taskId);if(!t)return;
  const note=document.getElementById('handoverNote')?.value?.trim()||'';const old=t.assignedTo||'';
  const upd={assignedTo:userName,status:t.status==='Open'?'In Progress':t.status};
  await db.ref('tasks/'+taskId).update(upd);
  addStatusHistory(taskId,`→${old||'nobody'}`,`→${userName}`,curUser.name+(note?' | Note: '+note:''));
  await triggerPA({...t,...upd},'task_assigned',{assignedTo:userName,assignedBy:curUser.name,handoverNote:note,teamsMessage:`👤 @${userName.split(' ')[0]} — Task assigned by ${curUser.name}:\n📋 ${t.title}\nPriority: ${t.priority} | Status: ${upd.status}\n${note?'📝 '+note+'\n':''}👉 https://ayyanartest-ui.github.io/shift-handover`});
  document.getElementById('modal').style.display='none';notify(`✅ Assigned to ${userName}! Teams notified.`);
}

// ── TASK MODAL ────────────────────────────────────────────────────────
function openTask(id){
  const t=tasks[id]||Object.values(tasks).find(x=>x.id===id);if(!t)return;
  const sla=getSLAInfo(t);const isAdmin=curUser.role==='Admin';
  const nextStatuses=STATUSES.filter(s=>s!==t.status);
  const hist=t.history?Object.values(t.history).sort((a,b)=>new Date(a.at)-new Date(b.at)):[];
  document.getElementById('modalTitle').textContent=`${T_ICON[t.type]||'📋'} ${t.title}`;
  document.getElementById('modalBody').innerHTML=`
    ${sla.breached&&!isTerminal(t.status)?`<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:10px 14px;font-size:13px;color:#fca5a5;font-weight:700;margin-bottom:14px">🔴 SLA BREACHED — Overdue by ${fmtMins(Math.abs(sla.remaining))}</div>`:sla.warning?`<div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:10px 14px;font-size:13px;color:#fcd34d;font-weight:600;margin-bottom:14px">⚠️ SLA Warning — ${fmtMins(sla.remaining)} remaining</div>`:''}
    <div class="badges" style="margin-bottom:12px">${badge(t.priority,P_COLOR[t.priority],P_ICON[t.priority])} ${badge(t.status,S_COLOR[t.status]||'#888',S_ICON[t.status])} ${badge(t.type,'#7c3aed')} ${badge(t.shift,'#06b6d4')}</div>
    ${slaBarHTML(t)}
    <div style="font-size:11px;color:var(--text3);margin-bottom:12px">SLA: ${fmtMins(sla.elapsedMins)} elapsed / ${fmtMins(sla.limitMins)} limit · Logged: ${fmt(t.date)}</div>
    ${t.description?`<div style="font-size:13px;color:var(--text2);background:rgba(255,255,255,.03);border:1px solid var(--border2);padding:12px;border-radius:10px;margin-bottom:12px;line-height:1.6">${esc(t.description)}</div>`:''}
    ${t.handoverNote?`<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:12px"><b style="color:#fcd34d">📝 Handover Note:</b> <span style="color:var(--text2)">${esc(t.handoverNote)}</span></div>`:''}
    <div style="font-size:12px;color:var(--text3);margin-bottom:10px">📤 By <b style="color:var(--text2)">${esc(t.submittedBy)}</b> · ${fmt(t.date)}</div>
    <div style="margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      ${t.assignedTo?`<span class="assignee-pill"><div class="avatar" style="width:22px;height:22px;font-size:10px;background:${avatarColor(t.assignedTo)}">${avatarInitials(t.assignedTo)}</div>${esc(t.assignedTo)}</span>`:`<span class="assignee-pill unassigned">⚠️ No owner assigned</span>`}
      ${!isTerminal(t.status)?`<button class="btn btn-sm btn-primary" onclick="document.getElementById('modal').style.display='none';openAssignModal('${id}')">👤 ${t.assignedTo?'Re-assign':'Assign'}</button>`:''}
    </div>
    ${!isTerminal(t.status)?`<div class="form-group">
      <label class="form-label">Update Status</label>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="newStatus" style="margin:0;flex:1">${nextStatuses.map(s=>`<option value="${s}">${S_ICON[s]} ${s}</option>`).join('')}</select>
        <button class="btn btn-primary btn-sm" onclick="updateStatus('${id}')">Update →</button>
      </div>
    </div>
    ${!t.assignedTo?`<button class="btn btn-orange btn-sm" style="margin-right:8px" onclick="takeTask('${id}')">🙋 Take Task</button>`:''}`:''}
    ${isAdmin?`<button class="btn btn-danger btn-sm" onclick="deleteTask('${id}')">🗑 Delete</button>`:''}
    ${hist.length?`<div style="margin-top:18px"><div style="font-weight:700;font-size:13px;color:var(--text);margin-bottom:12px">📜 Status History</div>
      <div class="timeline">${hist.map(h=>`<div class="tl-item"><div class="tl-dot"></div><div class="tl-text"><b style="color:var(--text)">${esc(h.from)}</b> → <b style="color:var(--primary-light)">${esc(h.to)}</b> by ${esc(h.by)}</div><div class="tl-time">${fmt(h.at)}</div></div>`).join('')}</div></div>`:''}`;
  document.getElementById('modal').style.display='flex';
}
async function updateStatus(id){
  const t=tasks[id]||Object.values(tasks).find(x=>x.id===id);if(!t)return;
  const ns=document.getElementById('newStatus').value;const os=t.status;
  const upd={status:ns};if(ns==='Closed')upd.dateClosed=new Date().toISOString();if(!t.assignedTo)upd.assignedTo=curUser.name;
  await db.ref('tasks/'+id).update(upd);addStatusHistory(id,os,ns,curUser.name);await triggerPA({...t,...upd},'status_update');
  notify(`✅ Status → "${ns}"`);document.getElementById('modal').style.display='none';
}
async function takeTask(id){
  const t=tasks[id]||Object.values(tasks).find(x=>x.id===id);if(!t)return;
  const upd={status:'In Progress',assignedTo:curUser.name};
  await db.ref('tasks/'+id).update(upd);addStatusHistory(id,t.status,'In Progress',curUser.name);await triggerPA({...t,...upd},'task_taken');
  notify('✅ You took ownership!');openTask(id);
}
function deleteTask(id){if(curUser.role!=='Admin'){notify('Admin only.','error');return;}if(!confirm('Delete permanently?'))return;db.ref('tasks/'+id).remove();document.getElementById('modal').style.display='none';notify('Deleted.');}
function closeModal(e){if(e.target.id==='modal')document.getElementById('modal').style.display='none';}

// ── TEAM STATS ────────────────────────────────────────────────────────
function renderTeam(){
  const all=taskArr();const people={};

  const sorted=Object.values(people).sort((a,b)=>b.taken-a.taken);
  document.getElementById('view-team').innerHTML=`
  <div class="stat-grid">
    ${[['Members',sorted.length,'#7c3aed'],['Active',all.filter(t=>!isTerminal(t.status)).length,'#f59e0b'],['Resolved',all.filter(t=>isTerminal(t.status)).length,'#10b981'],['SLA Breaches',all.filter(t=>getSLAInfo(t).breached).length,'#ef4444']].map(([l,v,c])=>`<div class="stat-card" style="--stat-color:${c}"><div class="stat-num">${v}</div><div class="stat-label">${l}</div></div>`).join('')}
  </div>
  <div class="card">

    </div>
    ${sorted.length===0?`<div class="empty"><div class="empty-icon">👥</div>No data yet.</div>`:sorted.map(p=>{
      const eff=p.taken>0?Math.round(p.closed/p.taken*100):0;const avgRes=p.closedCount>0?fmtMins(Math.round(p.totalMins/p.closedCount)):'—';const slaRate=p.taken>0?Math.round((p.taken-p.slaBreached)/p.taken*100):100;const col=avatarColor(p.name);
      return`<div class="person-card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="avatar" style="width:44px;height:44px;font-size:16px;background:${col}">${avatarInitials(p.name)}</div>
            <div><div style="font-weight:800;font-size:15px;color:var(--text)">${esc(p.name)}</div><div style="font-size:12px;color:var(--text3);margin-top:2px">${p.active} active · ${p.logged} logged</div></div>
          </div>
          <div style="text-align:right"><div style="font-size:24px;font-weight:900;color:${eff>=75?'#10b981':eff>=40?'#f59e0b':'#ef4444'}">${eff}%</div><div style="font-size:11px;color:var(--text3)">efficiency</div></div>
        </div>
        <div class="eff-bar-wrap"><div class="eff-bar" style="width:${eff}%"></div></div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:10px">
          <span class="mini-stat">🙋 ${p.taken} taken</span>
          <span class="mini-stat">✅ ${p.closed} closed</span>
          <span class="mini-stat" style="color:${slaRate>=80?'#10b981':'#ef4444'}">⏱ ${slaRate}% SLA</span>
          <span class="mini-stat">⚡ ${avgRes} avg</span>
          ${p.slaBreached?`<span class="mini-stat" style="color:#ef4444">🔴 ${p.slaBreached} breached</span>`:''}
        </div>
      </div>`;}).join('')}
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title"><div class="card-title-icon">📊</div>Status Breakdown</div></div>
    <div class="badges" style="gap:8px;flex-wrap:wrap">${STATUSES.map(s=>{const c=taskArr().filter(t=>t.status===s).length;return badge(`${S_ICON[s]} ${s}: ${c}`,S_COLOR[s]||'#888');}).join('')}</div>
  </div>`;
}

// ── SUMMARY ───────────────────────────────────────────────────────────

// ── REMINDER HELPERS ──────────────────────────────────────────────────
function getAgeMinutes(d){return Math.floor((Date.now()-new Date(d).getTime())/60000);}
function formatAge(m){if(m<60)return m+'m ago';const h=Math.floor(m/60),r=m%60;return r?`${h}h ${r}m ago`:`${h}h ago`;}
function getStaleItems(){return taskArr().filter(t=>!isTerminal(t.status)).map(t=>{const age=getAgeMinutes(t.date),threshold=reminderSettings.thresholds[t.priority]||60;return{...t,age,threshold,isStale:age>=threshold};}).filter(t=>t.isStale).sort((a,b)=>b.age-a.age);}
function checkAutoPopup(){if(!reminderSettings.enabled||!reminderSettings.autoPopup)return;const stale=getStaleItems();if(stale.length>0)setTimeout(()=>openReminderAlertModal(stale),1500);}
function reminderBannerHTML(){
  if(!reminderSettings.enabled||!reminderSettings.notifyOnDashboard)return'';
  const stale=getStaleItems();
  if(stale.length===0)return`<div style="background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:13px;color:#6ee7b7;font-weight:600;display:flex;align-items:center;gap:8px">✅ All pending items within threshold — team is on track!</div>`;
  const hc=stale.filter(t=>t.priority==='High').length;
  return`<div class="reminder-banner" onclick="toggleReminderBanner()">
    <div class="reminder-banner-header">
      <div style="font-weight:700;font-size:14px;color:#fcd34d;display:flex;align-items:center"><span class="reminder-pulse"></span>⏰ ${stale.length} Pending Items Awaiting Action ${hc?`<span style="background:#ef4444;color:white;font-size:10px;padding:1px 8px;border-radius:10px;margin-left:6px">${hc} High</span>`:''}</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-xs btn-orange" onclick="event.stopPropagation();openReminderAlertModal(null)">📢 Remind</button>
        <span style="color:#fcd34d" id="reminderChevron">${reminderBannerOpen?'▲':'▼'}</span>
      </div>
    </div>
    <div class="reminder-items ${reminderBannerOpen?'open':''}" id="reminderItems">
      ${stale.map(t=>{const lvl=t.priority==='High'?'critical':t.priority==='Medium'?'warning':'info';
        return`<div class="reminder-item ${lvl}" onclick="event.stopPropagation();openTask('${t.id}')">
          <div style="font-size:16px">${T_ICON[t.type]||'📋'}</div>
          <div style="flex:1"><div style="font-weight:700;color:var(--text)">${esc(t.title)}<span class="stale-badge">+${formatAge(t.age)}</span></div>
          <div style="font-size:11px;color:var(--text3);margin-top:3px">${badge(t.priority,P_COLOR[t.priority],P_ICON[t.priority])} By ${esc(t.submittedBy)} ${t.assignedTo?'→ 🔄 '+esc(t.assignedTo):'⚠️ Unassigned'}</div></div>
        </div>`;}).join('')}
    </div>
  </div>`;
}
function toggleReminderBanner(){reminderBannerOpen=!reminderBannerOpen;const i=document.getElementById('reminderItems'),c=document.getElementById('reminderChevron');if(i)i.classList.toggle('open',reminderBannerOpen);if(c)c.textContent=reminderBannerOpen?'▲':'▼';}

function saveReminderSettings(){reminderSettings.enabled=document.getElementById('rc-enabled').checked;reminderSettings.autoPopup=document.getElementById('rc-popup').checked;reminderSettings.thresholds.High=parseInt(document.getElementById('rc-th-high').value)||30;reminderSettings.thresholds.Medium=parseInt(document.getElementById('rc-th-med').value)||60;reminderSettings.thresholds.Low=parseInt(document.getElementById('rc-th-low').value)||120;db.ref('config/reminders').set(reminderSettings);document.getElementById('modal').style.display='none';notify('✅ Settings saved!');if(curView==='dashboard')renderDashboard();}

    ${!PA_WEBHOOK_URL?`<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#fca5a5;margin-bottom:12px">⚠️ Power Automate not configured — reminders won't reach Teams.</div>`:''}
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ${autoReminderConfig.enabled?'btn-danger':'btn-success'}" onclick="toggleAutoReminder()">${autoReminderConfig.enabled?'⏸ Pause':'▶ Start'}</button>
      <button class="btn btn-primary" onclick="saveARConfig()">💾 Save Intervals</button>
      <button class="btn btn-orange btn-sm" onclick="fireAutoReminder(false);notify('📢 Manual reminder sent!','info')">📢 Fire Now</button>
      ${major.length?`<button class="btn btn-danger btn-sm" onclick="fireAutoReminder(true)">🚨 Major Alert</button>`:''}
    </div>`;
  document.getElementById('modal').style.display='flex';
}
async function toggleAutoReminder(){autoReminderConfig.enabled=!autoReminderConfig.enabled;await db.ref('config/autoReminder').update({enabled:autoReminderConfig.enabled});if(autoReminderConfig.enabled)startAutoReminderEngine();else stopAutoReminderEngine();notify(autoReminderConfig.enabled?'✅ Auto-Reminder started!':'⏸ Paused.',autoReminderConfig.enabled?'success':'warn');document.getElementById('modal').style.display='none';}
async function saveARConfig(){autoReminderConfig.normalIntervalMins=parseInt(document.getElementById('ar-normal').value)||30;autoReminderConfig.majorIntervalMins=parseInt(document.getElementById('ar-major').value)||15;await db.ref('config/autoReminder').update({normalIntervalMins:autoReminderConfig.normalIntervalMins,majorIntervalMins:autoReminderConfig.majorIntervalMins});if(autoReminderConfig.enabled)startAutoReminderEngine();notify('✅ Intervals saved!');openAutoReminderPanel();}

// ── TEAMS NOTIFICATION ────────────────────────────────────────────────
function sendTeamsNotification(){
  const all=taskArr();const active=all.filter(t=>!isTerminal(t.status));const sh=getCurrentShift();const cfg=SHIFTS_CONFIG[sh]||{};
  let msg=`📋 SHIFT HANDOVER — ${sh} Shift | ${new Date().toLocaleDateString('en-IN')}\nIST: ${cfg.ist||''} | EST: ${cfg.est||''}\n\n`;
  STATUSES.filter(s=>s!=='Closed').forEach(s=>{const items=active.filter(t=>t.status===s);if(items.length){msg+=`${S_ICON[s]} ${s.toUpperCase()} (${items.length})\n`;items.forEach(t=>{const sla=getSLAInfo(t);msg+=`  • ${P_ICON[t.priority]} ${T_ICON[t.type]} ${t.title} | ${sla.breached?'🔴 BREACHED':'⏱ '+fmtMins(sla.remaining)+' left'} | ${t.assignedTo?'→ '+t.assignedTo:'⚠️ Unassigned'}\n`;});msg+='\n';}});
  msg+=`📊 Active: ${active.length} | Breached: ${all.filter(t=>getSLAInfo(t).breached).length} | Closed Today: ${closedToday()}\n👉 https://ayyanartest-ui.github.io/shift-handover`;
  document.getElementById('modalTitle').textContent='📢 Teams Notification';
  document.getElementById('modalBody').innerHTML=`<div style="font-size:12px;color:var(--text3);margin-bottom:10px">Copy and post in your Teams channel:</div><div class="code-box">${esc(msg)}</div><button class="btn btn-primary" style="margin-top:12px" onclick="navigator.clipboard.writeText(window._nm||'').then(()=>notify('✅ Copied!'))">📋 Copy</button>`;
  window._nm=msg;document.getElementById('modal').style.display='flex';
}

// ── ADMIN ──────────────────────────────────────────────────────────────
function renderAdmin(){
  if(curUser.role!=='Admin'){document.getElementById('view-admin').innerHTML='<div class="card"><div class="empty"><div class="empty-icon">⛔</div>Admin access only.</div></div>';return;}
  const curTab=window._adminTab||'users';
  document.getElementById('view-admin').innerHTML=`
  <div class="card" style="padding:0;overflow:hidden">
    <div class="admin-tabs">
      ${[['users','👥 Users'],['shifts','⏰ Shifts'],['sla','📊 SLA'],['pa','🔗 Power Automate'],['stats','📈 Stats']].map(([k,l])=>`<button class="admin-tab-btn${curTab===k?' active':''}" onclick="window._adminTab='${k}';renderAdmin()">${l}</button>`).join('')}
    </div>
    <div style="padding:20px" id="adminContent"></div>
  </div>`;
  if(curTab==='users')renderAdminUsers();if(curTab==='shifts')renderAdminShifts();if(curTab==='sla')renderAdminSLA();if(curTab==='pa')renderAdminPA();if(curTab==='stats')renderAdminStats();
}
async function renderAdminUsers(){
  const snap=await db.ref('users').get();users=snap.val()||{};
  document.getElementById('adminContent').innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div style="font-weight:700;font-size:15px">Team Members (${Object.keys(users).length})</div>
    <button class="btn btn-primary btn-sm" onclick="openAddUser()">+ Add User</button>
  </div>
  ${Object.values(users).map(u=>`<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:14px;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="avatar" style="width:40px;height:40px;font-size:15px;background:${avatarColor(u.name)}">${avatarInitials(u.name)}</div>
      <div><div style="font-weight:700">${esc(u.name)}</div><div style="font-size:12px;color:var(--text3)">${esc(u.email)}</div></div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      ${badge(u.role,ROLE_COLOR[u.role]||'#888')} ${badge(u.shift,'#06b6d4')} ${badge(u.active?'Active':'Inactive',u.active?'#10b981':'#ef4444')}
      <span style="font-size:12px;font-weight:700;color:var(--primary-light)">${assignedCount(u.name)} active</span>
      <button class="btn btn-sm btn-primary" onclick="openEditUser('${u.id}')">✏️</button>
      <button class="btn btn-sm btn-danger" onclick="toggleActive('${u.id}',${u.active})">${u.active?'Deactivate':'Activate'}</button>
    </div>
  </div>`).join('')}`;
}
function renderAdminSLA(){
  document.getElementById('adminContent').innerHTML=`<div style="font-weight:700;font-size:15px;margin-bottom:14px">SLA Configuration</div>
  <div style="background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:10px;padding:12px;font-size:13px;color:var(--primary-light);margin-bottom:16px">SLA timer starts when logged and stops on Closed.</div>
  <div class="row3">
    <div class="form-group"><label class="form-label">🔴 High (mins)</label><input type="number" id="sla-high" value="${SLA_CONFIG.High}" min="5"/></div>
    <div class="form-group"><label class="form-label">🟡 Medium (mins)</label><input type="number" id="sla-med" value="${SLA_CONFIG.Medium}" min="5"/></div>
    <div class="form-group"><label class="form-label">🟢 Low (mins)</label><input type="number" id="sla-low" value="${SLA_CONFIG.Low}" min="5"/></div>
  </div>
  <button class="btn btn-primary" onclick="saveSLAConfig()">💾 Save SLA</button>`;
}
function saveSLAConfig(){SLA_CONFIG.High=parseInt(document.getElementById('sla-high').value)||60;SLA_CONFIG.Medium=parseInt(document.getElementById('sla-med').value)||240;SLA_CONFIG.Low=parseInt(document.getElementById('sla-low').value)||480;db.ref('config/sla').set(SLA_CONFIG);notify('✅ SLA saved!');renderAdmin();}
function renderAdminPA(){
  document.getElementById('adminContent').innerHTML=`<div style="font-weight:700;font-size:15px;margin-bottom:14px">Power Automate Integration</div>
  <div style="background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.2);border-radius:10px;padding:16px;font-size:13px;color:var(--accent);margin-bottom:16px;line-height:1.9">
    <b>Setup:</b><br>
    1. Power Automate → <b>When HTTP request received</b><br>
    2. Paste the POST URL below<br>
    3. Teams action: use <code style="background:rgba(0,0,0,.2);padding:1px 6px;border-radius:4px">triggerBody()?['teamsMessage']</code> as the message<br>
    4. Condition on <code style="background:rgba(0,0,0,.2);padding:1px 6px;border-radius:4px">eventType</code>: new_task · task_assigned · scheduled_reminder · major_reminder
  </div>
  <div class="form-group"><label class="form-label">HTTP Trigger URL</label><input id="pa-url" style="font-family:monospace;font-size:12px" value="${esc(PA_WEBHOOK_URL)}" placeholder="https://prod-xx.eastus.logic.azure.com:443/workflows/..."/></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-primary" onclick="savePAWebhook()">💾 Save</button>
    <button class="btn btn-gray" onclick="testPAWebhook()">🧪 Test</button>
    ${PA_WEBHOOK_URL?`<button class="btn btn-danger btn-sm" onclick="clearPAWebhook()">🗑 Remove</button>`:''}
  </div>`;
}
async function savePAWebhook(){const url=document.getElementById('pa-url').value.trim();PA_WEBHOOK_URL=url;await db.ref('config/paWebhook').set(url);notify(url?'✅ Webhook saved!':'Cleared.');renderAdmin();}
async function testPAWebhook(){if(!PA_WEBHOOK_URL){notify('Enter URL first.','error');return;}const tt={id:'test-001',title:'🧪 ShiftOps v4.0 — Test Alert',description:'Testing PA integration.',type:'Task',shift:getCurrentShift(),priority:'High',status:'Open',submittedBy:curUser.name,assignedTo:curUser.name,date:new Date().toISOString()};await triggerPA(tt,'new_task',{teamsMessage:`🧪 TEST from ShiftOps\n✅ Power Automate connected!\nBy: ${curUser.name}\n👉 https://ayyanartest-ui.github.io/shift-handover`});notify('🧪 Test fired! Check Teams.','info');}
function clearPAWebhook(){if(!confirm('Remove?'))return;PA_WEBHOOK_URL='';db.ref('config/paWebhook').set('');notify('Removed.');renderAdmin();}
function renderAdminStats(){
  const all=taskArr();const breached=all.filter(t=>getSLAInfo(t).breached).length;
  document.getElementById('adminContent').innerHTML=`<div style="font-weight:700;font-size:15px;margin-bottom:16px">Statistics</div>
  <div class="stat-grid" style="margin-bottom:16px">
    ${[['Total',all.length,'#7c3aed'],['Active',all.filter(t=>!isTerminal(t.status)).length,'#f59e0b'],['SLA Breach',breached,'#ef4444'],['Closed',all.filter(t=>isTerminal(t.status)).length,'#10b981']].map(([l,v,c])=>`<div class="stat-card" style="--stat-color:${c}"><div class="stat-num">${v}</div><div class="stat-label">${l}</div></div>`).join('')}
  </div>
  <div style="font-weight:700;margin-bottom:10px;font-size:13px">Status Breakdown</div>
  <div class="badges" style="margin-bottom:16px;flex-wrap:wrap;gap:6px">${STATUSES.map(s=>badge(`${S_ICON[s]} ${s}: ${all.filter(t=>t.status===s).length}`,S_COLOR[s]||'#888')).join('')}</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-danger btn-sm" onclick="clearClosed()">🗑 Clear Closed</button>
    <button class="btn btn-primary btn-sm" onclick="downloadCSV()">⬇ Export CSV</button>
  </div>`;
}
function clearClosed(){if(!confirm('Remove all closed?'))return;Object.values(tasks).filter(t=>isTerminal(t.status)).forEach(t=>db.ref('tasks/'+t.id).remove());notify('Cleared.');}
function openAddUser(){document.getElementById('modalTitle').textContent='➕ Add User';document.getElementById('modalBody').innerHTML=userForm({name:'',email:'',password:'',role:'Agent',shift:'Morning',active:true},'saveNewUser()');document.getElementById('modal').style.display='flex';}
function openEditUser(uid){const u=users[uid];if(!u)return;document.getElementById('modalTitle').textContent='✏️ Edit User';document.getElementById('modalBody').innerHTML=userForm(u,`saveEditUser('${uid}')`);document.getElementById('modal').style.display='flex';}
function userForm(u,onSave){return`<div class="form-group"><label class="form-label">Full Name *</label><input id="uf-name" value="${esc(u.name)}" placeholder="e.g. Vignesh"/></div>
  <div class="form-group"><label class="form-label">Email * (@reachmobile.com)</label><input id="uf-email" value="${esc(u.email)}" placeholder="name@reachmobile.com"/></div>
  <div class="form-group"><label class="form-label">Password *</label><input id="uf-pass" type="password" value="${esc(u.password)}" placeholder="Min 6 characters"/></div>
  <div class="row2">
    <div class="form-group"><label class="form-label">Role</label><select id="uf-role">${['Admin','Supervisor','Agent'].map(r=>`<option${r===u.role?' selected':''}>${r}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">Shift</label><select id="uf-shift">${SHIFTS.map(s=>`<option${s===u.shift?' selected':''}>${s}</option>`).join('')}</select></div>
  </div>
  <div class="form-group"><label class="form-label">Status</label><select id="uf-active"><option value="true"${u.active?' selected':''}>Active</option><option value="false"${!u.active?' selected':''}>Inactive</option></select></div>
  <button class="btn btn-primary" onclick="${onSave}">💾 Save User</button>`;}
function getUserFormData(){return{name:document.getElementById('uf-name').value.trim(),email:document.getElementById('uf-email').value.trim().toLowerCase(),password:document.getElementById('uf-pass').value,role:document.getElementById('uf-role').value,shift:document.getElementById('uf-shift').value,active:document.getElementById('uf-active').value==='true'};}
function validateUser(d){if(!d.name||!d.email||!d.password){notify('Fill all fields.','error');return false;}if(!d.email.endsWith('@reachmobile.com')){notify('Email must be @reachmobile.com','error');return false;}if(d.password.length<6){notify('Password min 6 chars.','error');return false;}return true;}
function saveNewUser(){const d=getUserFormData();if(!validateUser(d))return;const ni='u'+Date.now();db.ref('users/'+ni).set({id:ni,...d});document.getElementById('modal').style.display='none';notify('✅ User added!');window._adminTab='users';renderAdmin();}
function saveEditUser(uid){const d=getUserFormData();if(!validateUser(d))return;db.ref('users/'+uid).update(d);document.getElementById('modal').style.display='none';notify('✅ Updated!');window._adminTab='users';renderAdmin();}
function toggleActive(uid,current){db.ref('users/'+uid).update({active:!current});notify(`User ${!current?'activated':'deactivated'}.`);window._adminTab='users';renderAdmin();}
function renderAdminShifts(){
  document.getElementById('adminContent').innerHTML=`<div style="font-weight:700;font-size:15px;margin-bottom:16px">Shift Timing Configuration</div>
  ${['Morning','Afternoon','Night'].map(sh=>{const c=SHIFTS_CONFIG[sh]||{};return`<div style="background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:12px">
    <div style="font-weight:700;margin-bottom:12px">${{Morning:'🌅',Afternoon:'🌆',Night:'🌙'}[sh]} ${sh} Shift</div>
    <div class="row2">
      <div class="form-group"><label class="form-label">Start IST</label><input id="sh-${sh}-is" value="${(c.ist||'').split('–')[0]?.trim()||''}"/></div>
      <div class="form-group"><label class="form-label">End IST</label><input id="sh-${sh}-ie" value="${(c.ist||'').split('–')[1]?.trim()||''}"/></div>
    </div>
    <div class="row2">
      <div class="form-group"><label class="form-label">Start EST</label><input id="sh-${sh}-es" value="${(c.est||'').split('–')[0]?.trim()||''}"/></div>
      <div class="form-group"><label class="form-label">End EST</label><input id="sh-${sh}-ee" value="${(c.est||'').split('–')[1]?.trim()||''}"/></div>
    </div>
    <div class="row2">
      <div class="form-group"><label class="form-label">Notify IST</label><input id="sh-${sh}-ni" value="${c.notifyIST||''}"/></div>
      <div class="form-group"><label class="form-label">Notify EST</label><input id="sh-${sh}-ne" value="${c.notifyEST||''}"/></div>
    </div></div>`;}).join('')}
  <button class="btn btn-primary" onclick="saveShiftTimings()">💾 Save Timings</button>`;
}
function saveShiftTimings(){const u={};['Morning','Afternoon','Night'].forEach(sh=>{u[sh]={ist:`${document.getElementById(`sh-${sh}-is`).value.trim()} – ${document.getElementById(`sh-${sh}-ie`).value.trim()}`,est:`${document.getElementById(`sh-${sh}-es`).value.trim()} – ${document.getElementById(`sh-${sh}-ee`).value.trim()}`,notifyIST:document.getElementById(`sh-${sh}-ni`).value.trim(),notifyEST:document.getElementById(`sh-${sh}-ne`).value.trim()};});db.ref('config/shifts').set(u);Object.assign(SHIFTS_CONFIG,u);notify('✅ Shifts saved!');updateHeader();}
function downloadCSV(){const headers=['Title','Type','Description','Shift','Priority','Status','Submitted By','Assigned To','Handover Note','Date','Closed','SLA Limit','SLA Status'];const rows=taskArr().map(t=>{const sla=getSLAInfo(t);return[`"${(t.title||'').replace(/"/g,'""')}"`,t.type,`"${(t.description||'').replace(/"/g,'""')}"`,t.shift,t.priority,t.status,`"${(t.submittedBy||'').replace(/"/g,'""')}"`,`"${(t.assignedTo||'').replace(/"/g,'""')}"`,`"${(t.handoverNote||'').replace(/"/g,'""')}"`,fmt(t.date),fmt(t.dateClosed),fmtMins(sla.limitMins),sla.breached?'BREACHED':isTerminal(t.status)&&sla.elapsedMins<=sla.limitMins?'Met':'Active'];});const csv=[headers.join(','),...rows.map(r=>r.join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`ShiftOps_${new Date().toISOString().slice(0,10)}.csv`;a.click();notify('✅ CSV downloaded!');}

init();
</script>
</body>
</html>
